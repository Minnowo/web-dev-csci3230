version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vue-frontend
    ports:
      - "5173:5173"
    volumes:
      # Only mount source files — node_modules stays inside the container from the image build
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.js:/app/vite.config.js
    environment:
      - NODE_ENV=development
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: express-backend
    ports:
      - "3000:3000"
    volumes:
      - ./backend/src:/app/src
      - ./backend/scripts:/app/scripts
      - ./backend/.env:/app/.env
      - ./frontend/src/services/mockData.js:/frontend/src/services/mockData.js
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=development
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s

  seeder:
    image: node:20-alpine
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./backend/scripts:/scripts
    command: node /scripts/seedTestData.mjs
    environment:
      - API_URL=http://backend:3000/api
    restart: "no"

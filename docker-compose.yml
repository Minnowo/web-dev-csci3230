version: '3.8'

services:
  # The frontend Vue application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vue-frontend
    ports:
      - "5173:5173"
    volumes:
      # Sync source code for Hot Module Replacement (HMR)
      - ./frontend:/app
      # Ignore node_modules from local machine so Docker uses the ones inside the container
      - /app/node_modules
    environment:
      - NODE_ENV=development
    restart: unless-stopped

